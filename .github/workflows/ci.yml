name: Rust CI

on:
  push:
    branches:
    - "main"
    - "renovate/**"
  pull_request:

permissions:
  contents: write
  checks: write

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
    - name: Check out
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Set up Rust (stable)
      uses: dtolnay/rust-toolchain@stable

    - name: Cache build artifacts
      uses: Swatinem/rust-cache@v2

    - name: cargo test
      run: cargo test --workspace

    - name: Show Git Status
      run: git status

  pre-commit:
    name: Pre-Commit
    runs-on: ubuntu-latest

    steps:
    - name: Check out
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - uses: andrewaylett/pre-commit-action@8278f0338c0988e330bbcda99408e47a8a28cf3f # v4
      with:
        extra_args: --all-files --hook-stage pre-merge-commit
