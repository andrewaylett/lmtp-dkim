name: Rust CI

on:
  push:
    branches:
    - "main"
    - "renovate/**"
  pull_request:

permissions:
  contents: write
  checks: write

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
    - name: Check out
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Set up Rust (stable)
      uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

    - name: Cache build artifacts
      uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

    - name: Install cargo-nextest
      uses: taiki-e/install-action@42da9be79a11d8ca0e8c34ace6fb0f18b0efec62 # nextest

    - name: cargo nextest run
      run: cargo nextest run --workspace --profile ci

    - name: Show Git Status
      run: git status

  pre-commit:
    name: Pre-Commit
    runs-on: ubuntu-latest

    steps:
    - name: Check out
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - uses: andrewaylett/pre-commit-action@8278f0338c0988e330bbcda99408e47a8a28cf3f # v4
      with:
        extra_args: --all-files --hook-stage pre-merge-commit
